<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Hero Animation</title>
    <style>
        :root {
            --bg: #FDFCFB;
            --bg-alt: #F4F2EF;
            --text: #1A1A1A;
            --text-muted: #555555;
            --accent: #006D77;
            --accent-light: #83C5BE;
            --card-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --bg-alt: #1E1E1E;
            --text: #F0F0F0;
            --text-muted: #AAAAAA;
            --accent: #83C5BE;
            --accent-light: #006D77;
            --card-bg: #1A1A1A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        .unstable-coin {
            animation: coinScatter 10s infinite ease-in-out;
        }

        .paper-note {
            animation: noteFloat 10s infinite ease-in-out;
        }

        .particle-stream {
            animation: dissolveToParticles 10s infinite ease-in-out;
        }

        .data-bar {
            animation: barGrow 10s infinite ease-in-out;
        }

        .graph-line {
            animation: graphTrend 10s infinite ease-in-out;
        }

        .dashboard-block {
            animation: dashboardForm 10s infinite ease-in-out;
        }

        .glow-pulse {
            animation: glowPulse 10s infinite ease-in-out;
        }

        @keyframes coinScatter {
            0%, 20% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            35% {
                transform: translate(30px, 20px) rotate(45deg);
                opacity: 0.7;
            }
            50% {
                transform: translate(60px, 40px) rotate(90deg);
                opacity: 0.3;
            }
            70%, 100% {
                transform: translate(100px, 60px) rotate(180deg);
                opacity: 0;
            }
        }

        @keyframes noteFloat {
            0%, 25% {
                transform: translate(0, 0) skewX(0deg);
                opacity: 1;
            }
            40% {
                transform: translate(-20px, 30px) skewX(10deg);
                opacity: 0.6;
            }
            60% {
                transform: translate(-40px, 50px) skewX(20deg);
                opacity: 0.2;
            }
            80%, 100% {
                transform: translate(-80px, 80px) skewX(45deg);
                opacity: 0;
            }
        }

        @keyframes dissolveToParticles {
            0%, 50% {
                transform: scale(0.5);
                opacity: 0;
            }
            60% {
                transform: scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes barGrow {
            0%, 60% {
                transform: scaleY(0);
                opacity: 0;
            }
            70% {
                transform: scaleY(0.3);
                opacity: 0.6;
            }
            85% {
                transform: scaleY(0.8);
                opacity: 0.9;
            }
            100% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        @keyframes graphTrend {
            0%, 55% {
                stroke-dasharray: 200;
                stroke-dashoffset: 200;
                opacity: 0;
            }
            70% {
                stroke-dashoffset: 100;
                opacity: 0.5;
            }
            90%, 100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        @keyframes dashboardForm {
            0%, 65% {
                transform: translateY(20px);
                opacity: 0;
            }
            80% {
                transform: translateY(5px);
                opacity: 0.7;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0%, 60% {
                filter: drop-shadow(0 0 0 transparent);
                opacity: 0.3;
            }
            80% {
                filter: drop-shadow(0 0 15px var(--accent-light));
                opacity: 0.8;
            }
            100% {
                filter: drop-shadow(0 0 25px var(--accent));
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="barGradient" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:var(--accent-light);stop-opacity:0.8" />
            </linearGradient>
            <linearGradient id="particleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--accent-light);stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--accent);stop-opacity:0.6" />
            </linearGradient>
            <filter id="glow">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Background grid -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--text-muted)" stroke-width="0.5" stroke-opacity="0.08"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- Abstract upward trend lines in background -->
        <g class="graph-line" fill="none" stroke="var(--accent-light)" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round">
            <path d="M100,350 Q200,320 300,300 T500,250 T700,180" />
        </g>
        <g class="graph-line" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round" style="animation-delay: 0.5s">
            <path d="M100,380 Q220,340 340,310 T550,260 T750,200" />
        </g>

        <!-- Scattered coins (left side - unstable) -->
        <g class="unstable-coin" transform="translate(180, 280)">
            <circle cx="0" cy="0" r="15" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.4"/>
            <line x1="-8" y1="0" x2="8" y2="0" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3"/>
            <line x1="0" y1="-8" x2="0" y2="8" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3"/>
        </g>

        <g class="unstable-coin" transform="translate(220, 250)" style="animation-delay: 0.3s">
            <circle cx="0" cy="0" r="12" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.35"/>
            <circle cx="0" cy="0" r="5" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3"/>
        </g>

        <g class="unstable-coin" transform="translate(150, 320)" style="animation-delay: 0.6s">
            <circle cx="0" cy="0" r="18" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.3"/>
            <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3"/>
        </g>

        <g class="unstable-coin" transform="translate(200, 300)" style="animation-delay: 0.9s">
            <ellipse cx="0" cy="0" rx="14" ry="10" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.35"/>
        </g>

        <!-- Paper notes sliding around -->
        <g class="paper-note" transform="translate(120, 200)">
            <rect x="-20" y="-30" width="40" height="60" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3" transform="rotate(-10)"/>
            <line x1="-15" y1="-15" x2="15" y2="-15" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.4" transform="rotate(-10)"/>
            <line x1="-15" y1="0" x2="10" y2="0" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.4" transform="rotate(-10)"/>
            <line x1="-15" y1="15" x2="8" y2="15" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.4" transform="rotate(-10)"/>
        </g>

        <g class="paper-note" transform="translate(250, 180)" style="animation-delay: 0.4s">
            <rect x="-25" y="-35" width="50" height="70" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.25" transform="rotate(15)"/>
            <line x1="-18" y1="-18" x2="18" y2="-18" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.35" transform="rotate(15)"/>
            <line x1="-18" y1="0" x2="12" y2="0" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.35" transform="rotate(15)"/>
        </g>

        <g class="paper-note" transform="translate(90, 260)" style="animation-delay: 0.7s">
            <rect x="-18" y="-25" width="36" height="50" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.2" transform="rotate(-20)"/>
        </g>

        <!-- Particle streams (transforming from physical to digital) -->
        <g class="particle-stream">
            <g transform="translate(300, 200)">
                <circle cx="0" cy="0" r="3" fill="var(--accent-light)" filter="url(#glow)">
                    <animate attributeName="cx" from="-50" to="150" dur="3s" repeatCount="indefinite"/>
                    <animate attributeName="cy" values="0;-20;10;-5;0" dur="3s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="0" cy="0" r="2" fill="var(--accent)" filter="url(#glow)">
                    <animate attributeName="cx" from="-50" to="150" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
                    <animate attributeName="cy" values="10;-30;20;-10;10" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
                </circle>
                <circle cx="0" cy="0" r="2.5" fill="var(--accent-light)" filter="url(#glow)">
                    <animate attributeName="cx" from="-50" to="150" dur="3.2s" begin="1s" repeatCount="indefinite"/>
                    <animate attributeName="cy" values="-10;-40;30;0;-10" dur="3.2s" begin="1s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0;1;1;0" dur="3.2s" begin="1s" repeatCount="indefinite"/>
                </circle>
            </g>
            <g transform="translate(320, 250)">
                <circle cx="0" cy="0" r="2" fill="var(--accent)" filter="url(#glow)">
                    <animate attributeName="cx" from="-40" to="120" dur="2.8s" repeatCount="indefinite"/>
                    <animate attributeName="cy" values="0;-15;15;0" dur="2.8s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.8s" repeatCount="indefinite"/>
                </circle>
                <circle cx="0" cy="0" r="1.5" fill="var(--accent-light)" filter="url(#glow)">
                    <animate attributeName="cx" from="-40" to="120" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
                    <animate attributeName="cy" values="5;-25;25;5" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
                </circle>
            </g>
        </g>

        <!-- Financial dashboard blocks (right side - emerging) -->
        <g class="dashboard-block" transform="translate(550, 150)">
            <rect x="-80" y="-50" width="160" height="100" rx="8" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.3" filter="url(#glow)"/>
            <!-- Data bars inside -->
            <g transform="translate(-60, -30)">
                <rect x="0" y="0" width="15" height="60" rx="2" fill="url(#barGradient)" class="data-bar"/>
                <rect x="25" y="10" width="15" height="50" rx="2" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.1s"/>
                <rect x="50" y="5" width="15" height="55" rx="2" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.2s"/>
                <rect x="75" y="15" width="15" height="45" rx="2" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.3s"/>
                <rect x="100" y="0" width="15" height="60" rx="2" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.4s"/>
            </g>
        </g>

        <g class="dashboard-block" transform="translate(680, 200)" style="animation-delay: 0.2s">
            <rect x="-50" y="-40" width="100" height="80" rx="6" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.2" filter="url(#glow)"/>
            <!-- Mini line chart -->
            <g transform="translate(-35, -20)">
                <path d="M0,30 L20,20 L40,25 L60,10 L70,5" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
            <!-- Sparkline dots -->
            <circle cx="-35" cy="10" r="2" fill="var(--accent-light)"/>
            <circle cx="-15" cy="0" r="2" fill="var(--accent-light)"/>
            <circle cx="5" cy="5" r="2" fill="var(--accent-light)"/>
            <circle cx="25" cy="-10" r="2" fill="var(--accent-light)"/>
            <circle cx="35" cy="-15" r="2" fill="var(--accent-light)"/>
        </g>

        <g class="dashboard-block" transform="translate(600, 280)" style="animation-delay: 0.4s">
            <rect x="-60" y="-30" width="120" height="60" rx="6" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.25" filter="url(#glow)"/>
            <!-- Horizontal progress indicators -->
            <rect x="-45" y="-15" width="90" height="6" rx="3" fill="var(--bg-alt)"/>
            <rect x="-45" y="-15" width="70" height="6" rx="3" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.1s"/>
            <rect x="-45" y="0" width="90" height="6" rx="3" fill="var(--bg-alt)"/>
            <rect x="-45" y="0" width="55" height="6" rx="3" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.3s"/>
            <rect x="-45" y="15" width="90" height="6" rx="3" fill="var(--bg-alt)"/>
            <rect x="-45" y="15" width="80" height="6" rx="3" fill="url(#barGradient)" class="data-bar" style="animation-delay: 0.5s"/>
        </g>

        <!-- Glowing connection nodes -->
        <g class="glow-pulse">
            <circle cx="580" cy="220" r="4" fill="var(--accent)" filter="url(#glow)"/>
            <circle cx="620" cy="180" r="3" fill="var(--accent-light)" filter="url(#glow)"/>
            <circle cx="650" cy="260" r="3.5" fill="var(--accent)" filter="url(#glow)"/>
        </g>

        <!-- Connection lines between dashboard elements -->
        <g stroke="var(--accent)" stroke-width="1" stroke-opacity="0.15" fill="none">
            <line x1="550" y1="200" x2="630" y2="200">
                <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
            </line>
            <line x1="600" y1="250" x2="680" y2="240">
                <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="4s" begin="1s" repeatCount="indefinite"/>
            </line>
        </g>

        <!-- Floating data points -->
        <g fill="var(--accent-light)" fill-opacity="0.5">
            <circle cx="400" cy="150" r="2">
                <animate attributeName="cy" values="150;140;150" dur="4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
            </circle>
            <circle cx="420" cy="200" r="1.5">
                <animate attributeName="cy" values="200;190;200" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="380" cy="280" r="2">
                <animate attributeName="cy" values="280;270;280" dur="5s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
            </circle>
        </g>
    </svg>

    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        
        window.addEventListener('message', (e) => {
            if (e.data && typeof e.data === 'object' && e.data.theme) {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });
    </script>
</body>
</html>
