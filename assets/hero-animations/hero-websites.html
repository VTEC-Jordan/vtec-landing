<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websites Hero Animation</title>
    <style>
        :root {
            --bg: #FDFCFB;
            --bg-alt: #F4F2EF;
            --text: #1A1A1A;
            --text-muted: #555555;
            --accent: #006D77;
            --accent-light: #83C5BE;
            --card-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --bg-alt: #1E1E1E;
            --text: #F0F0F0;
            --text-muted: #AAAAAA;
            --accent: #83C5BE;
            --accent-light: #006D77;
            --card-bg: #1A1A1A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        .broken-panel {
            animation: glitchFragment 10s infinite ease-in-out;
        }

        .misaligned-block {
            animation: misalign 10s infinite ease-in-out;
        }

        .spinning-loader {
            animation: spinGlitch 10s infinite ease-in-out;
        }

        .stable-panel {
            animation: assemble 10s infinite ease-in-out;
        }

        .scan-line {
            animation: scanSweep 10s infinite ease-in-out;
        }

        .ui-element {
            animation: uiStabilize 10s infinite ease-in-out;
        }

        .connection-wire {
            animation: wireConnect 10s infinite ease-in-out;
        }

        @keyframes glitchFragment {
            0%, 30% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.7;
            }
            15% {
                transform: translate(5px, -3px) rotate(2deg);
                opacity: 0.5;
            }
            45% {
                transform: translate(20px, -10px) rotate(8deg);
                opacity: 0.2;
            }
            60%, 100% {
                transform: translate(40px, -20px) rotate(15deg);
                opacity: 0;
            }
        }

        @keyframes misalign {
            0%, 35% {
                transform: translateX(0) skewX(0deg);
                opacity: 0.6;
            }
            50% {
                transform: translateX(15px) skewX(5deg);
                opacity: 0.3;
            }
            70%, 100% {
                transform: translateX(30px) skewX(10deg);
                opacity: 0;
            }
        }

        @keyframes spinGlitch {
            0%, 40% {
                transform: rotate(0deg);
                opacity: 0.8;
                stroke-dasharray: 20, 10;
            }
            50% {
                transform: rotate(180deg);
                opacity: 0.5;
                stroke-dasharray: 5, 15;
            }
            80%, 100% {
                transform: rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes assemble {
            0%, 55% {
                transform: translateY(-50px) scale(0.8);
                opacity: 0;
            }
            70% {
                transform: translateY(-10px) scale(0.95);
                opacity: 0.6;
            }
            85% {
                transform: translateY(0) scale(1);
                opacity: 0.9;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes scanSweep {
            0%, 75% {
                transform: translateX(-400px);
                opacity: 0;
            }
            80% {
                transform: translateX(-200px);
                opacity: 0.5;
            }
            95% {
                transform: translateX(0);
                opacity: 0.8;
            }
            100% {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        @keyframes uiStabilize {
            0%, 65% {
                opacity: 0;
                transform: translateY(15px);
            }
            80% {
                opacity: 0.6;
                transform: translateY(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes wireConnect {
            0%, 60% {
                stroke-dasharray: 100;
                stroke-dashoffset: 100;
                opacity: 0;
            }
            75% {
                stroke-dasharray: 100;
                stroke-dashoffset: 50;
                opacity: 0.5;
            }
            100% {
                stroke-dasharray: 100;
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="panelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--card-bg);stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--bg-alt);stop-opacity:1" />
            </linearGradient>
            <linearGradient id="scanGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0" />
                <stop offset="50%" style="stop-color:var(--accent-light);stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:var(--accent);stop-opacity:0" />
            </linearGradient>
            <filter id="softGlow">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- Background -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--text-muted)" stroke-width="0.5" stroke-opacity="0.06"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- Broken/glitchy UI panels (left side - initial state) -->
        <g class="broken-panel" transform="translate(200, 180)">
            <rect x="-70" y="-50" width="140" height="100" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="5,3"/>
            <rect x="-60" y="-40" width="120" height="20" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.2"/>
            <rect x="-60" y="-10" width="80" height="40" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.2"/>
            <line x1="-30" y1="-30" x2="30" y2="-30" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.3"/>
        </g>

        <g class="broken-panel" transform="translate(150, 280)" style="animation-delay: 0.5s">
            <rect x="-50" y="-40" width="100" height="80" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.25" transform="rotate(-5)"/>
            <circle cx="0" cy="-15" r="15" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.2"/>
            <rect x="-30" y="5" width="60" height="8" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.2"/>
        </g>

        <!-- Misaligned blocks -->
        <g class="misaligned-block" transform="translate(280, 220)">
            <rect x="-40" y="-30" width="80" height="60" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.3"/>
            <rect x="-30" y="-20" width="60" height="30" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.4"/>
        </g>

        <g class="misaligned-block" transform="translate(320, 160)" style="animation-delay: 0.3s">
            <rect x="-25" y="-35" width="50" height="70" fill="var(--bg-alt)" stroke="var(--text-muted)" stroke-width="1" stroke-opacity="0.25"/>
        </g>

        <!-- Spinning loaders/broken buttons -->
        <g class="spinning-loader" transform="translate(250, 140)">
            <circle cx="0" cy="0" r="20" fill="none" stroke="var(--text-muted)" stroke-width="3" stroke-opacity="0.4"/>
            <circle cx="0" cy="0" r="12" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.3"/>
            <path d="M-8,-8 L8,8 M8,-8 L-8,8" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.3"/>
        </g>

        <g class="spinning-loader" transform="translate(180, 320)" style="animation-delay: 0.7s">
            <rect x="-30" y="-12" width="60" height="24" rx="4" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-opacity="0.35"/>
        </g>

        <!-- Stable, assembled website layout (center-right) -->
        <g class="stable-panel" transform="translate(500, 200)">
            <!-- Main container -->
            <rect x="-120" y="-100" width="240" height="200" rx="8" fill="url(#panelGradient)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.3" filter="url(#softGlow)"/>
            
            <!-- Header section -->
            <rect x="-110" y="-90" width="220" height="30" rx="4" fill="var(--bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.2"/>
            <rect x="-100" y="-80" width="60" height="10" rx="2" fill="var(--accent)" fill-opacity="0.3"/>
            <circle cx="95" cy="-75" r="6" fill="var(--accent-light)" fill-opacity="0.4"/>
            
            <!-- Content blocks -->
            <rect x="-110" y="-50" width="100" height="60" rx="4" fill="var(--bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.15"/>
            <rect x="-100" y="-40" width="80" height="6" rx="2" fill="var(--text-muted)" fill-opacity="0.2"/>
            <rect x="-100" y="-28" width="60" height="6" rx="2" fill="var(--text-muted)" fill-opacity="0.15"/>
            <rect x="-100" y="-16" width="70" height="6" rx="2" fill="var(--text-muted)" fill-opacity="0.15"/>
            
            <rect x="10" y="-50" width="100" height="60" rx="4" fill="var(--bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.15"/>
            <rect x="20" y="-40" width="80" height="40" rx="2" fill="var(--accent)" fill-opacity="0.1"/>
            
            <!-- Bottom section with buttons -->
            <rect x="-110" y="20" width="220" height="30" rx="4" fill="var(--bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.2"/>
            <rect x="-100" y="28" width="50" height="14" rx="3" fill="var(--accent)" fill-opacity="0.3"/>
            <rect x="-40" y="28" width="50" height="14" rx="3" fill="none" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.4"/>
            <rect x="20" y="28" width="50" height="14" rx="3" fill="none" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.4"/>
        </g>

        <!-- Additional UI sections -->
        <g class="stable-panel" transform="translate(500, 80)" style="animation-delay: 0.2s">
            <rect x="-80" y="-25" width="160" height="50" rx="4" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.25" filter="url(#softGlow)"/>
            <rect x="-70" y="-15" width="40" height="8" rx="2" fill="var(--accent)" fill-opacity="0.4"/>
            <rect x="-70" y="0" width="140" height="4" rx="2" fill="var(--text-muted)" fill-opacity="0.15"/>
            <rect x="-70" y="8" width="100" height="4" rx="2" fill="var(--text-muted)" fill-opacity="0.1"/>
        </g>

        <!-- Side panel -->
        <g class="stable-panel" transform="translate(680, 150)" style="animation-delay: 0.4s">
            <rect x="-40" y="-80" width="80" height="160" rx="4" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.2" filter="url(#softGlow)"/>
            <rect x="-30" y="-70" width="60" height="8" rx="2" fill="var(--accent)" fill-opacity="0.3"/>
            <rect x="-30" y="-55" width="60" height="20" rx="2" fill="var(--bg-alt)"/>
            <rect x="-30" y="-25" width="60" height="20" rx="2" fill="var(--bg-alt)"/>
            <rect x="-30" y="5" width="60" height="20" rx="2" fill="var(--bg-alt)"/>
            <rect x="-30" y="35" width="60" height="20" rx="2" fill="var(--bg-alt)"/>
        </g>

        <!-- Connection wires between panels -->
        <g class="connection-wire" fill="none" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.2">
            <path d="M380,200 Q440,180 500,150" />
            <path d="M380,250 Q450,270 500,280" style="animation-delay: 0.2s"/>
            <path d="M620,200 Q650,180 680,150" style="animation-delay: 0.4s"/>
        </g>

        <!-- Scan line effect (moving across) -->
        <g class="scan-line">
            <rect x="-100" y="0" width="200" height="400" fill="url(#scanGradient)" opacity="0.5" transform="skewX(-20)"/>
        </g>

        <!-- Floating UI elements -->
        <g class="ui-element" transform="translate(600, 320)">
            <rect x="-30" y="-15" width="60" height="30" rx="15" fill="var(--accent)" fill-opacity="0.2" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.3"/>
            <circle cx="-10" cy="0" r="4" fill="var(--accent-light)"/>
        </g>

        <g class="ui-element" transform="translate(420, 320)" style="animation-delay: 0.3s">
            <rect x="-25" y="-12" width="50" height="24" rx="4" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.2"/>
            <rect x="-18" y="-4" width="36" height="8" rx="2" fill="var(--accent)" fill-opacity="0.3"/>
        </g>

        <!-- Data flowing dots -->
        <g fill="var(--accent)">
            <circle cx="0" cy="0" r="2" opacity="0.6">
                <animateMotion path="M400,150 Q500,120 580,150" dur="3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="1.5" opacity="0.4">
                <animateMotion path="M400,250 Q500,280 580,250" dur="3.5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="2" opacity="0.5">
                <animateMotion path="M640,180 Q660,150 700,150" dur="2.5s" repeatCount="indefinite"/>
            </circle>
        </g>

        <!-- Grid overlay for tech feel -->
        <g stroke="var(--accent)" stroke-width="0.5" stroke-opacity="0.08">
            <line x1="400" y1="0" x2="400" y2="400">
                <animate attributeName="stroke-opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite"/>
            </line>
            <line x1="600" y1="0" x2="600" y2="400">
                <animate attributeName="stroke-opacity" values="0.05;0.15;0.05" dur="4s" begin="1s" repeatCount="indefinite"/>
            </line>
        </g>
    </svg>

    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        
        window.addEventListener('message', (e) => {
            if (e.data && typeof e.data === 'object' && e.data.theme) {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });
    </script>
</body>
</html>
